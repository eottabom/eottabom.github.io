<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <linearGradient id="bBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="bSh" x="-2%" y="-2%" width="104%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="560" height="440" rx="12" fill="url(#bBg)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="280" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">컨텍스트 윈도우 (128K 예시)</text>

  <!-- Main container -->
  <rect x="120" y="48" width="300" height="370" rx="10" fill="white" stroke="#cbd5e1" stroke-width="1.5" filter="url(#bSh)"/>

  <!-- System prompt block -->
  <rect x="126" y="54" width="288" height="36" rx="6" fill="#8b5cf6" opacity="0.9"/>
  <text x="270" y="77" text-anchor="middle" font-size="12" font-weight="700" fill="white">시스템 프롬프트</text>

  <!-- History block -->
  <rect x="126" y="94" width="288" height="52" rx="6" fill="#f59e0b" opacity="0.9"/>
  <text x="270" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="white">이전 대화 기록</text>

  <!-- RAG block -->
  <rect x="126" y="150" width="288" height="110" rx="6" fill="#3b82f6" opacity="0.9"/>
  <text x="270" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="white">RAG 컨텍스트</text>
  <text x="270" y="220" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">(검색된 문서, 참고 자료)</text>

  <!-- User input block -->
  <rect x="126" y="264" width="288" height="28" rx="6" fill="#10b981" opacity="0.9"/>
  <text x="270" y="283" text-anchor="middle" font-size="11" font-weight="700" fill="white">사용자 질문</text>

  <!-- Separator -->
  <line x1="126" y1="298" x2="414" y2="298" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- LLM response block -->
  <rect x="126" y="304" width="288" height="36" rx="6" fill="#ef4444" opacity="0.9"/>
  <text x="270" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="white">LLM 응답</text>

  <!-- Free space -->
  <rect x="126" y="344" width="288" height="68" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="270" y="378" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">남은 여유분</text>
  <text x="270" y="396" text-anchor="middle" font-size="10" fill="#94a3b8">~63,500 토큰</text>

  <!-- Right labels -->
  <g font-size="11" fill="#64748b" font-weight="600">
    <text x="426" y="77">~2,000 토큰 (고정)</text>
    <text x="426" y="125">~10,000 토큰 (누적)</text>
    <text x="426" y="208">~50,000 토큰</text>
    <text x="426" y="283">~500 토큰</text>
    <text x="426" y="327" fill="#dc2626">~2,000 토큰</text>
  </g>

  <!-- Left labels -->
  <g font-size="10" font-weight="600">
    <text x="112" y="170" text-anchor="end" fill="#64748b">입력 토큰</text>
    <text x="112" y="183" text-anchor="end" fill="#94a3b8">(저렴)</text>
    <text x="112" y="327" text-anchor="end" fill="#dc2626">출력 토큰</text>
    <text x="112" y="340" text-anchor="end" fill="#dc2626">(2~4x 비쌈)</text>
  </g>

  <!-- Input bracket -->
  <line x1="116" y1="54" x2="116" y2="292" stroke="#64748b" stroke-width="1.5"/>
  <line x1="116" y1="54" x2="120" y2="54" stroke="#64748b" stroke-width="1.5"/>
  <line x1="116" y1="292" x2="120" y2="292" stroke="#64748b" stroke-width="1.5"/>

  <!-- Output bracket -->
  <line x1="116" y1="304" x2="116" y2="340" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="116" y1="304" x2="120" y2="304" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="116" y1="340" x2="120" y2="340" stroke="#dc2626" stroke-width="1.5"/>
</svg>
