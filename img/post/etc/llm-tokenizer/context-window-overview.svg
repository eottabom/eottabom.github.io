<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 160" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <linearGradient id="oBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="oSh" x="-2%" y="-6%" width="104%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="760" height="160" rx="12" fill="url(#oBg)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">컨텍스트 윈도우 (Context Window)</text>

  <!-- Main container -->
  <rect x="30" y="44" width="700" height="72" rx="10" fill="white" stroke="#cbd5e1" stroke-width="1.5" filter="url(#oSh)"/>

  <!-- 4 sections -->
  <rect x="34" y="48" width="160" height="64" rx="8" fill="#8b5cf6" opacity="0.9"/>
  <text x="114" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="white">시스템 프롬프트</text>
  <text x="114" y="90" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">매 요청마다 소비</text>

  <rect x="198" y="48" width="200" height="64" rx="8" fill="#f59e0b" opacity="0.9"/>
  <text x="298" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="white">이전 대화 기록</text>
  <text x="298" y="90" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">턴이 쌓일수록 증가</text>

  <rect x="402" y="48" width="140" height="64" rx="8" fill="#10b981" opacity="0.9"/>
  <text x="472" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="white">사용자 입력</text>
  <text x="472" y="90" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">현재 질문</text>

  <rect x="546" y="48" width="180" height="64" rx="8" fill="#ef4444" opacity="0.9"/>
  <text x="636" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="white">LLM 응답</text>
  <text x="636" y="90" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">생성될 응답</text>

  <!-- Plus signs -->
  <text x="196" y="84" text-anchor="middle" font-size="16" font-weight="700" fill="#cbd5e1">+</text>
  <text x="400" y="84" text-anchor="middle" font-size="16" font-weight="700" fill="#cbd5e1">+</text>
  <text x="544" y="84" text-anchor="middle" font-size="16" font-weight="700" fill="#cbd5e1">+</text>

  <!-- Labels -->
  <text x="298" y="140" text-anchor="middle" font-size="11" fill="#64748b">입력 토큰 (Input) — 상대적으로 저렴</text>
  <text x="636" y="140" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">출력 토큰 — 2~4x 비쌈</text>

  <!-- Bracket lines -->
  <line x1="34" y1="122" x2="542" y2="122" stroke="#64748b" stroke-width="1.5"/>
  <line x1="34" y1="118" x2="34" y2="126" stroke="#64748b" stroke-width="1.5"/>
  <line x1="542" y1="118" x2="542" y2="126" stroke="#64748b" stroke-width="1.5"/>

  <line x1="546" y1="122" x2="726" y2="122" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="546" y1="118" x2="546" y2="126" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="726" y1="118" x2="726" y2="126" stroke="#dc2626" stroke-width="1.5"/>
</svg>
