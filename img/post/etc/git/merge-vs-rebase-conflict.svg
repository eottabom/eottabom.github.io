<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 280" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="13">
  <text x="375" y="24" text-anchor="middle" font-weight="700" fill="#1e293b" font-size="15">충돌 시 HEAD 가 가리키는 대상</text>
  <!-- Merge section -->
  <rect x="20" y="50" width="340" height="210" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="190" y="76" text-anchor="middle" font-weight="700" fill="#1e40af" font-size="14">git merge main</text>
  <text x="190" y="96" text-anchor="middle" fill="#64748b" font-size="11">(feature 브랜치에서 실행)</text>
  <!-- conflict block merge -->
  <rect x="50" y="115" width="280" height="90" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="60" y="136" fill="#dc2626" font-family="monospace" font-size="12">&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</text>
  <text x="60" y="156" fill="#1e40af" font-weight="600" font-size="12">feature 브랜치 코드 (내 코드)</text>
  <text x="60" y="172" fill="#64748b" font-family="monospace" font-size="12">=======</text>
  <text x="60" y="192" fill="#b45309" font-weight="600" font-size="12">main 브랜치 코드 (가져오는 코드)</text>
  <!-- labels -->
  <rect x="60" y="220" width="120" height="24" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="120" y="236" text-anchor="middle" fill="#1e40af" font-weight="600" font-size="11">HEAD = feature</text>
  <rect x="200" y="220" width="120" height="24" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="260" y="236" text-anchor="middle" fill="#92400e" font-weight="600" font-size="11">Incoming = main</text>
  <!-- Rebase section -->
  <rect x="390" y="50" width="340" height="210" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="560" y="76" text-anchor="middle" font-weight="700" fill="#b45309" font-size="14">git rebase main</text>
  <text x="560" y="96" text-anchor="middle" fill="#64748b" font-size="11">(feature 브랜치에서 실행)</text>
  <!-- conflict block rebase -->
  <rect x="420" y="115" width="280" height="90" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="430" y="136" fill="#dc2626" font-family="monospace" font-size="12">&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</text>
  <text x="430" y="156" fill="#1e40af" font-weight="600" font-size="12">main 브랜치 코드 (기준점)</text>
  <text x="430" y="172" fill="#64748b" font-family="monospace" font-size="12">=======</text>
  <text x="430" y="192" fill="#b45309" font-weight="600" font-size="12">feature 커밋 코드 (다시 적용 중)</text>
  <!-- labels -->
  <rect x="430" y="220" width="120" height="24" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="490" y="236" text-anchor="middle" fill="#1e40af" font-weight="600" font-size="11">HEAD = main</text>
  <rect x="570" y="220" width="120" height="24" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="630" y="236" text-anchor="middle" fill="#92400e" font-weight="600" font-size="11">Applying = feature</text>
  <!-- warning -->
  <text x="375" y="278" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="600">Merge 와 Rebase 에서 HEAD 가 가리키는 대상이 반대이다!</text>
</svg>