<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 250" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" font-size="13">
  <defs>
    <marker id="ca" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94a3b8"/></marker>
    <marker id="cr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef4444"/></marker>
  </defs>
  <text x="340" y="28" text-anchor="middle" font-weight="700" fill="#1e293b" font-size="15">Cherry-pick</text>

  <!-- ===== develop branch ===== -->
  <rect x="20" y="57" width="72" height="22" rx="4" fill="#64748b"/>
  <text x="56" y="72" text-anchor="middle" fill="#fff" font-weight="600" font-size="11">develop</text>

  <circle cx="132" cy="68" r="20" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="132" y="73" text-anchor="middle" fill="#475569" font-weight="600" font-size="12">C1</text>
  <line x1="152" y1="68" x2="190" y2="68" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ca)"/>

  <circle cx="210" cy="68" r="20" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="210" y="73" text-anchor="middle" fill="#475569" font-weight="600" font-size="12">C2</text>
  <line x1="230" y1="68" x2="268" y2="68" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ca)"/>

  <!-- hotfix commit (picked) -->
  <text x="288" y="38" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">hotfix</text>
  <circle cx="288" cy="68" r="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="288" y="73" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12">C3</text>
  <line x1="308" y1="68" x2="346" y2="68" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ca)"/>

  <circle cx="366" cy="68" r="20" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="366" y="73" text-anchor="middle" fill="#475569" font-weight="600" font-size="12">C4</text>

  <!-- ===== cherry-pick arrow ===== -->
  <path d="M288,92 L288,162" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#cr)"/>
  <text x="288" y="132" text-anchor="end" fill="#ef4444" font-size="12" font-weight="600" dx="-12">cherry-pick</text>

  <!-- ===== release branch ===== -->
  <rect x="20" y="172" width="72" height="22" rx="4" fill="#3b82f6"/>
  <text x="56" y="187" text-anchor="middle" fill="#fff" font-weight="600" font-size="11">release</text>

  <circle cx="132" cy="183" r="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="132" y="188" text-anchor="middle" fill="#1e40af" font-weight="600" font-size="12">A1</text>
  <line x1="152" y1="183" x2="190" y2="183" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ca)"/>

  <circle cx="210" cy="183" r="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="210" y="188" text-anchor="middle" fill="#1e40af" font-weight="600" font-size="12">A2</text>
  <line x1="230" y1="183" x2="268" y2="183" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ca)"/>

  <!-- copied commit -->
  <circle cx="288" cy="183" r="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="288" y="188" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12">C3'</text>

  <!-- note -->
  <rect x="430" y="158" width="225" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="180" fill="#64748b" font-size="11">C3' 은 C3 의 복사본</text>
  <text x="450" y="198" fill="#64748b" font-size="11">(새 해시, 같은 변경 내용)</text>
