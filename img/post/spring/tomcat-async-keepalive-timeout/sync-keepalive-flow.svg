<svg width="960" height="748" viewBox="0 0 960 748" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-sync" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="960" height="748" rx="24" fill="#F8FAFC"/>
  <text x="480" y="50" text-anchor="middle" fill="#0F172A" font-size="28" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="700">정상 경로: 동기 요청에서는 keepAliveTimeout 으로 갱신된다</text>
  <text x="480" y="78" text-anchor="middle" fill="#475569" font-size="14" font-family="Pretendard, Noto Sans KR, sans-serif">핵심은 keep-alive 재진입 전에 socketWrapper.readTimeout 이 100s 로 바뀌는지 여부다.</text>

  <rect x="240" y="112" width="480" height="74" rx="16" fill="#E0F2FE" stroke="#7DD3FC"/>
  <text x="480" y="142" text-anchor="middle" fill="#0369A1" font-size="16" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="700">[1] NioEndpoint.setSocketOptions()</text>
  <text x="480" y="168" text-anchor="middle" fill="#0C4A6E" font-size="14" font-family="SFMono-Regular, Menlo, Consolas, monospace">socketWrapper.setReadTimeout(connectionTimeout)</text>

  <line x1="480" y1="186" x2="480" y2="214" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow-sync)"/>

  <rect x="240" y="224" width="480" height="86" rx="16" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="480" y="254" text-anchor="middle" fill="#4338CA" font-size="16" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="700">[2] Http11InputBuffer.parseRequestLine()</text>
  <text x="480" y="278" text-anchor="middle" fill="#312E81" font-size="14" font-family="Pretendard, Noto Sans KR, sans-serif">첫 요청이라 keptAlive = false</text>
  <text x="480" y="298" text-anchor="middle" fill="#312E81" font-size="14" font-family="SFMono-Regular, Menlo, Consolas, monospace">readTimeout = 60s 유지</text>

  <line x1="480" y1="310" x2="480" y2="338" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow-sync)"/>

  <rect x="240" y="348" width="480" height="84" rx="16" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="480" y="378" text-anchor="middle" fill="#334155" font-size="16" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="700">[3] CoyoteAdapter.service()</text>
  <text x="480" y="404" text-anchor="middle" fill="#334155" font-size="14" font-family="Pretendard, Noto Sans KR, sans-serif">Spring 동기 핸들러 실행</text>
  <text x="480" y="424" text-anchor="middle" fill="#334155" font-size="14" font-family="Pretendard, Noto Sans KR, sans-serif">응답 완료까지 readTimeout = 60s</text>

  <line x1="480" y1="432" x2="480" y2="460" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow-sync)"/>

  <rect x="240" y="470" width="480" height="98" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="480" y="500" text-anchor="middle" fill="#0F172A" font-size="16" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="700">[4] Http11Processor.service()</text>
  <text x="480" y="526" text-anchor="middle" fill="#334155" font-size="14" font-family="Pretendard, Noto Sans KR, sans-serif">응답 완료 후 keptAlive = true 로 전환</text>
  <text x="480" y="548" text-anchor="middle" fill="#334155" font-size="14" font-family="SFMono-Regular, Menlo, Consolas, monospace">다음 request line 대기 단계로 복귀</text>

  <line x1="480" y1="568" x2="480" y2="596" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow-sync)"/>

  <rect x="240" y="606" width="480" height="96" rx="16" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="480" y="636" text-anchor="middle" fill="#166534" font-size="16" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="700">[5] keep-alive 재진입</text>
  <text x="480" y="662" text-anchor="middle" fill="#166534" font-size="14" font-family="Pretendard, Noto Sans KR, sans-serif">parseRequestLine() 에서 keptAlive = true 이므로</text>
  <text x="480" y="684" text-anchor="middle" fill="#166534" font-size="14" font-family="SFMono-Regular, Menlo, Consolas, monospace">setReadTimeout(keepAliveTimeout) → 100s</text>

  <rect x="748" y="250" width="176" height="194" rx="18" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="836" y="286" text-anchor="middle" fill="#047857" font-size="15" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="700">결과</text>
  <text x="836" y="320" text-anchor="middle" fill="#065F46" font-size="14" font-family="Pretendard, Noto Sans KR, sans-serif">NIO Poller 는</text>
  <text x="836" y="342" text-anchor="middle" fill="#065F46" font-size="14" font-family="SFMono-Regular, Menlo, Consolas, monospace">readTimeout = 100s</text>
  <text x="836" y="364" text-anchor="middle" fill="#065F46" font-size="14" font-family="Pretendard, Noto Sans KR, sans-serif">로 보고</text>
  <text x="836" y="390" text-anchor="middle" fill="#065F46" font-size="14" font-family="Pretendard, Noto Sans KR, sans-serif">idle close 는</text>
  <text x="836" y="412" text-anchor="middle" fill="#065F46" font-size="14" font-family="Pretendard, Noto Sans KR, sans-serif">100초 기준으로</text>
  <text x="836" y="434" text-anchor="middle" fill="#065F46" font-size="14" font-family="Pretendard, Noto Sans KR, sans-serif">동작한다</text>
</svg>
