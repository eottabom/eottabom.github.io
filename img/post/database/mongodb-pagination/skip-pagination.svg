<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-skip" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">Skip (Offset) 기반 Pagination</text>
  <text x="400" y="52" text-anchor="middle" font-size="13" fill="#6b7280">skip=5, limit=3 → 5개를 읽고 버린 뒤 3개 반환</text>

  <!-- Documents row -->
  <!-- Doc 0 -->
  <rect x="30" y="80" width="80" height="50" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="70" y="100" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="600">Doc 0</text>
  <text x="70" y="118" text-anchor="middle" font-size="10" fill="#b91c1c">스캔 후 버림</text>

  <!-- Doc 1 -->
  <rect x="120" y="80" width="80" height="50" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="160" y="100" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="600">Doc 1</text>
  <text x="160" y="118" text-anchor="middle" font-size="10" fill="#b91c1c">스캔 후 버림</text>

  <!-- Doc 2 -->
  <rect x="210" y="80" width="80" height="50" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="100" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="600">Doc 2</text>
  <text x="250" y="118" text-anchor="middle" font-size="10" fill="#b91c1c">스캔 후 버림</text>

  <!-- Doc 3 -->
  <rect x="300" y="80" width="80" height="50" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="340" y="100" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="600">Doc 3</text>
  <text x="340" y="118" text-anchor="middle" font-size="10" fill="#b91c1c">스캔 후 버림</text>

  <!-- Doc 4 -->
  <rect x="390" y="80" width="80" height="50" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="430" y="100" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="600">Doc 4</text>
  <text x="430" y="118" text-anchor="middle" font-size="10" fill="#b91c1c">스캔 후 버림</text>

  <!-- Doc 5 (반환) -->
  <rect x="490" y="80" width="80" height="50" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="530" y="100" text-anchor="middle" font-size="11" fill="#166534" font-weight="700">Doc 5</text>
  <text x="530" y="118" text-anchor="middle" font-size="10" fill="#15803d">반환</text>

  <!-- Doc 6 (반환) -->
  <rect x="580" y="80" width="80" height="50" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="620" y="100" text-anchor="middle" font-size="11" fill="#166534" font-weight="700">Doc 6</text>
  <text x="620" y="118" text-anchor="middle" font-size="10" fill="#15803d">반환</text>

  <!-- Doc 7 (반환) -->
  <rect x="670" y="80" width="80" height="50" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="710" y="100" text-anchor="middle" font-size="11" fill="#166534" font-weight="700">Doc 7</text>
  <text x="710" y="118" text-anchor="middle" font-size="10" fill="#15803d">반환</text>

  <!-- Scan arrow -->
  <line x1="30" y1="150" x2="750" y2="150" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-skip)" stroke-dasharray="6,3"/>
  <text x="400" y="170" text-anchor="middle" font-size="12" fill="#ef4444" font-weight="600">← 처음부터 끝까지 전체 스캔 →</text>

  <!-- Labels -->
  <rect x="50" y="195" width="360" height="36" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="230" y="218" text-anchor="middle" font-size="13" fill="#991b1b" font-weight="600">skip = 5개 읽고 버림 (낭비)</text>

  <rect x="490" y="195" width="260" height="36" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="620" y="218" text-anchor="middle" font-size="13" fill="#166534" font-weight="600">limit = 3개 반환</text>

  <!-- Complexity -->
  <rect x="100" y="260" width="600" height="60" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="400" y="282" text-anchor="middle" font-size="13" fill="#92400e" font-weight="600">시간 복잡도: O(offset + pageSize)</text>
  <text x="400" y="302" text-anchor="middle" font-size="12" fill="#a16207">offset 이 커질수록 → 읽고 버리는 문서가 많아짐 → 성능 저하</text>
</svg>