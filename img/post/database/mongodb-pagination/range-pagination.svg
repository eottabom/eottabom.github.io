<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow-range" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-seek" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">Range Query (Cursor) 기반 Pagination</text>
  <text x="400" y="52" text-anchor="middle" font-size="13" fill="#6b7280">lastId = Doc4._id, limit=3 → 인덱스로 바로 seek 후 3개 반환</text>

  <!-- Documents row -->
  <!-- Doc 0~4 (스킵 안함, 안 읽음) -->
  <rect x="30" y="80" width="80" height="50" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="70" y="100" text-anchor="middle" font-size="11" fill="#9ca3af" font-weight="500">Doc 0</text>
  <text x="70" y="118" text-anchor="middle" font-size="10" fill="#9ca3af">읽지 않음</text>

  <rect x="120" y="80" width="80" height="50" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="160" y="100" text-anchor="middle" font-size="11" fill="#9ca3af" font-weight="500">Doc 1</text>
  <text x="160" y="118" text-anchor="middle" font-size="10" fill="#9ca3af">읽지 않음</text>

  <rect x="210" y="80" width="80" height="50" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="250" y="100" text-anchor="middle" font-size="11" fill="#9ca3af" font-weight="500">Doc 2</text>
  <text x="250" y="118" text-anchor="middle" font-size="10" fill="#9ca3af">읽지 않음</text>

  <rect x="300" y="80" width="80" height="50" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="340" y="100" text-anchor="middle" font-size="11" fill="#9ca3af" font-weight="500">Doc 3</text>
  <text x="340" y="118" text-anchor="middle" font-size="10" fill="#9ca3af">읽지 않음</text>

  <!-- Doc 4 (lastId 기준점) -->
  <rect x="390" y="80" width="80" height="50" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="430" y="100" text-anchor="middle" font-size="11" fill="#5b21b6" font-weight="700">Doc 4</text>
  <text x="430" y="118" text-anchor="middle" font-size="10" fill="#6d28d9">lastId</text>

  <!-- Doc 5 (반환) -->
  <rect x="490" y="80" width="80" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="530" y="100" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="700">Doc 5</text>
  <text x="530" y="118" text-anchor="middle" font-size="10" fill="#1d4ed8">반환</text>

  <!-- Doc 6 (반환) -->
  <rect x="580" y="80" width="80" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="620" y="100" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="700">Doc 6</text>
  <text x="620" y="118" text-anchor="middle" font-size="10" fill="#1d4ed8">반환</text>

  <!-- Doc 7 (반환) -->
  <rect x="670" y="80" width="80" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="710" y="100" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="700">Doc 7</text>
  <text x="710" y="118" text-anchor="middle" font-size="10" fill="#1d4ed8">반환</text>

  <!-- Seek arrow (index seek) -->
  <path d="M70,150 Q250,185 425,150" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrow-seek)" stroke-dasharray="6,3"/>
  <text x="250" y="190" text-anchor="middle" font-size="12" fill="#7c3aed" font-weight="600">인덱스 Seek (O(logN))</text>

  <!-- Scan arrow (only 3 docs) -->
  <line x1="490" y1="150" x2="750" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-range)"/>
  <text x="620" y="170" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="600">3개만 스캔</text>

  <!-- Labels -->
  <rect x="50" y="210" width="360" height="36" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="230" y="233" text-anchor="middle" font-size="13" fill="#6b7280" font-weight="600">이전 문서는 읽지 않고 건너뜀</text>

  <rect x="490" y="210" width="260" height="36" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="620" y="233" text-anchor="middle" font-size="13" fill="#1e40af" font-weight="600">limit = 3개만 반환</text>

  <!-- Complexity -->
  <rect x="100" y="270" width="600" height="60" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="400" y="292" text-anchor="middle" font-size="13" fill="#166534" font-weight="600">시간 복잡도: O(logN + pageSize)</text>
  <text x="400" y="312" text-anchor="middle" font-size="12" fill="#15803d">offset 과 무관하게 → 항상 일정한 성능 유지</text>
</svg>