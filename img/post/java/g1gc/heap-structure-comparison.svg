<svg viewBox="0 0 1200 772" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title-main { font-size: 28px; font-weight: bold; fill: #000; }
      .title-sub { font-size: 22px; font-weight: bold; fill: #000; }
      .label { font-size: 20px; fill: #000; font-weight: bold; }
      .desc { font-size: 16px; fill: #000; }
      .small-text { font-size: 15px; fill: #000; }
      .region-text { font-size: 18px; font-weight: bold; text-anchor: middle; }
      .region-text-light { fill: #fff; }
      .region-text-dark { fill: #222; }
      .legend-text { font-size: 15px; fill: #000; }
    </style>
  </defs>

  <text x="600" y="50" class="title-main" text-anchor="middle">Heap 메모리 구조 비교</text>

  <!-- Left: Traditional Generational GC -->
  <rect x="20" y="80" width="550" height="680" fill="#f9f9f9" stroke="#999" stroke-width="3" rx="8"/>

  <text x="295" y="125" class="title-sub" text-anchor="middle">Generational GC</text>
  <text x="295" y="155" class="desc" text-anchor="middle">(고정된 영역)</text>

  <!-- Young Generation -->
  <rect x="60" y="180" width="470" height="120" fill="#FFE5E5" stroke="#FF6B6B" stroke-width="3" rx="4"/>
  <text x="295" y="235" class="label" text-anchor="middle">Young Generation</text>
  <text x="295" y="265" class="desc" text-anchor="middle">Eden + Survivor 1 + Survivor 2</text>

  <!-- Old Generation -->
  <rect x="60" y="330" width="470" height="200" fill="#F0E5FF" stroke="#9966FF" stroke-width="3" rx="4"/>
  <text x="295" y="415" class="label" text-anchor="middle">Old Generation</text>
  <text x="295" y="445" class="small-text" text-anchor="middle">한 번 Old가 되면</text>
  <text x="295" y="470" class="small-text" text-anchor="middle">영원히 Old</text>

  <!-- Info box -->
  <rect x="60" y="560" width="470" height="160" fill="#fff3cd" stroke="#ffc107" stroke-width="2" rx="4"/>
  <text x="80" y="587" class="small-text" font-weight="bold">문제점:</text>
  <text x="80" y="610" class="small-text">✗ 영역 크기가 고정</text>
  <text x="80" y="633" class="small-text">✗ Young/Old 비율 조정 어려움</text>
  <text x="80" y="656" class="small-text">✗ Full GC 시 전체 Heap 정지</text>
  <text x="80" y="679" class="small-text">✗ 단편화 문제 해결 어려움</text>

  <!-- Right: G1GC -->
  <rect x="630" y="80" width="550" height="680" fill="#f9f9f9" stroke="#999" stroke-width="3" rx="8"/>

  <text x="905" y="125" class="title-sub" text-anchor="middle">G1GC</text>
  <text x="905" y="155" class="desc" text-anchor="middle">(동적 Region)</text>

  <!-- Grid of Regions -->
  <g id="regions">
    <!-- Row 1 -->
    <rect x="680" y="180" width="48" height="48" fill="#FFE5E5" stroke="#FF6B6B" stroke-width="2"/>
    <text x="704" y="213" class="region-text region-text-dark">E</text>

    <rect x="740" y="180" width="48" height="48" fill="#FFE5E5" stroke="#FF6B6B" stroke-width="2"/>
    <text x="764" y="213" class="region-text region-text-dark">E</text>

    <rect x="800" y="180" width="48" height="48" fill="#E5F3FF" stroke="#4C99FF" stroke-width="2"/>
    <text x="824" y="213" class="region-text region-text-dark">S</text>

    <rect x="860" y="180" width="48" height="48" fill="#FFC700" stroke="#FF8C00" stroke-width="2"/>
    <text x="884" y="213" class="region-text region-text-dark">H</text>

    <rect x="920" y="180" width="48" height="48" fill="#F0E5FF" stroke="#9966FF" stroke-width="2"/>
    <text x="944" y="213" class="region-text region-text-dark">O</text>

    <rect x="980" y="180" width="48" height="48" fill="#E0E0E0" stroke="#666" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="1004" y="213" class="region-text region-text-dark">F</text>

    <!-- Row 2 -->
    <rect x="680" y="245" width="48" height="48" fill="#E5F3FF" stroke="#4C99FF" stroke-width="2"/>
    <text x="704" y="278" class="region-text region-text-dark">S</text>

    <rect x="740" y="245" width="48" height="48" fill="#F0E5FF" stroke="#9966FF" stroke-width="2"/>
    <text x="764" y="278" class="region-text region-text-dark">O</text>

    <rect x="800" y="245" width="48" height="48" fill="#FFE5E5" stroke="#FF6B6B" stroke-width="2"/>
    <text x="824" y="278" class="region-text region-text-dark">E</text>

    <rect x="860" y="245" width="48" height="48" fill="#F0E5FF" stroke="#9966FF" stroke-width="2"/>
    <text x="884" y="278" class="region-text region-text-dark">O</text>

    <rect x="920" y="245" width="48" height="48" fill="#E0E0E0" stroke="#666" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="944" y="278" class="region-text region-text-dark">F</text>

    <rect x="980" y="245" width="48" height="48" fill="#E5F3FF" stroke="#4C99FF" stroke-width="2"/>
    <text x="1004" y="278" class="region-text region-text-dark">S</text>

    <!-- Row 3 -->
    <rect x="680" y="310" width="48" height="48" fill="#F0E5FF" stroke="#9966FF" stroke-width="2"/>
    <text x="704" y="343" class="region-text region-text-dark">O</text>

    <rect x="740" y="310" width="48" height="48" fill="#FFE5E5" stroke="#FF6B6B" stroke-width="2"/>
    <text x="764" y="343" class="region-text region-text-dark">E</text>

    <rect x="800" y="310" width="48" height="48" fill="#F0E5FF" stroke="#9966FF" stroke-width="2"/>
    <text x="824" y="343" class="region-text region-text-dark">O</text>

    <rect x="860" y="310" width="48" height="48" fill="#FFE5E5" stroke="#FF6B6B" stroke-width="2"/>
    <text x="884" y="343" class="region-text region-text-dark">E</text>

    <rect x="920" y="310" width="48" height="48" fill="#E5F3FF" stroke="#4C99FF" stroke-width="2"/>
    <text x="944" y="343" class="region-text region-text-dark">S</text>

    <rect x="980" y="310" width="48" height="48" fill="#F0E5FF" stroke="#9966FF" stroke-width="2"/>
    <text x="1004" y="343" class="region-text region-text-dark">O</text>

    <!-- Row 4 -->
    <rect x="680" y="375" width="48" height="48" fill="#F0E5FF" stroke="#9966FF" stroke-width="2"/>
    <text x="704" y="408" class="region-text region-text-dark">O</text>

    <rect x="740" y="375" width="48" height="48" fill="#E0E0E0" stroke="#666" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="764" y="408" class="region-text region-text-dark">F</text>

    <rect x="800" y="375" width="48" height="48" fill="#FFE5E5" stroke="#FF6B6B" stroke-width="2"/>
    <text x="824" y="408" class="region-text region-text-dark">E</text>

    <rect x="860" y="375" width="48" height="48" fill="#F0E5FF" stroke="#9966FF" stroke-width="2"/>
    <text x="884" y="408" class="region-text region-text-dark">O</text>

    <rect x="920" y="375" width="48" height="48" fill="#FFC700" stroke="#FF8C00" stroke-width="2"/>
    <text x="944" y="408" class="region-text region-text-dark">H</text>

    <rect x="980" y="375" width="48" height="48" fill="#E5F3FF" stroke="#4C99FF" stroke-width="2"/>
    <text x="1004" y="408" class="region-text region-text-dark">S</text>
  </g>

  <!-- Legend -->
  <g id="legend">
    <rect x="680" y="450" width="360" height="118" fill="white" stroke="#ddd" stroke-width="2" rx="4"/>

    <rect x="700" y="470" width="18" height="18" fill="#FFE5E5" stroke="#FF6B6B" stroke-width="1.5"/>
    <text x="730" y="485" class="legend-text">E: Eden</text>

    <rect x="700" y="505" width="18" height="18" fill="#E5F3FF" stroke="#4C99FF" stroke-width="1.5"/>
    <text x="730" y="520" class="legend-text">S: Survivor</text>

    <rect x="890" y="470" width="18" height="18" fill="#F0E5FF" stroke="#9966FF" stroke-width="1.5"/>
    <text x="920" y="485" class="legend-text">O: Old</text>

    <rect x="890" y="505" width="18" height="18" fill="#FFC700" stroke="#FF8C00" stroke-width="1.5"/>
    <text x="920" y="520" class="legend-text">H: Humongous</text>

    <text x="700" y="545" class="small-text">각 Region: 1-32MB</text>
    <text x="700" y="561" class="small-text">(Heap 크기에 따라)</text>
  </g>

  <!-- Key insight -->
  <rect x="680" y="588" width="360" height="150" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="4"/>
  <text x="700" y="608" class="small-text" font-weight="bold">장점</text>
  <text x="700" y="630" class="small-text">✓ Region이 동적으로 역할 변경</text>
  <text x="700" y="653" class="small-text">✓ Young/Old 비율 유연하게 조정</text>
  <text x="700" y="676" class="small-text">✓ 회수 가치 높은 영역부터 우선 회수</text>
  <text x="700" y="699" class="small-text">✓ evacuation으로 단편화 완화</text>
</svg>
