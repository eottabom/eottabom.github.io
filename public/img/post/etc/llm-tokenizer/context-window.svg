<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <linearGradient id="cwBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="sysG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="histG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ragG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="userG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="outG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="freeG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="shw" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" rx="12" fill="url(#cwBg)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">컨텍스트 윈도우 구조 (128K 예시)</text>

  <!-- Main container -->
  <rect x="40" y="50" width="620" height="240" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shw)"/>

  <!-- Context window label -->
  <text x="350" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">128,000 Tokens</text>

  <!-- Stacked bars -->
  <!-- System prompt: ~2K / 128K ≈ 1.5% → width ≈ 10px min 40 -->
  <rect x="55" y="85" width="50" height="190" rx="6" fill="url(#sysG)" opacity="0.9"/>
  <text x="80" y="185" text-anchor="middle" font-size="11" font-weight="600" fill="white" transform="rotate(-90, 80, 185)">시스템 프롬프트</text>
  <text x="80" y="286" text-anchor="middle" font-size="10" fill="#8b5cf6" font-weight="600">~2K</text>

  <!-- History: ~10K / 128K ≈ 8% → width ≈ 65 -->
  <rect x="112" y="85" width="65" height="190" rx="6" fill="url(#histG)" opacity="0.9"/>
  <text x="144" y="185" text-anchor="middle" font-size="11" font-weight="600" fill="white" transform="rotate(-90, 144, 185)">이전 대화 기록</text>
  <text x="144" y="286" text-anchor="middle" font-size="10" fill="#d97706" font-weight="600">~10K</text>

  <!-- RAG context: ~50K / 128K ≈ 39% → width ≈ 200 -->
  <rect x="184" y="85" width="200" height="190" rx="6" fill="url(#ragG)" opacity="0.9"/>
  <text x="284" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="white">RAG 컨텍스트</text>
  <text x="284" y="195" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">(검색된 문서, 참고 자료)</text>
  <text x="284" y="286" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="600">~50K</text>

  <!-- User input: ~500 / 128K → width ≈ 30 -->
  <rect x="391" y="85" width="35" height="190" rx="6" fill="url(#userG)" opacity="0.9"/>
  <text x="408" y="185" text-anchor="middle" font-size="10" font-weight="600" fill="white" transform="rotate(-90, 408, 185)">사용자 질문</text>
  <text x="408" y="286" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">~500</text>

  <!-- Output: ~2K → width ≈ 45 -->
  <rect x="433" y="85" width="45" height="190" rx="6" fill="url(#outG)" opacity="0.9"/>
  <text x="455" y="185" text-anchor="middle" font-size="10" font-weight="600" fill="white" transform="rotate(-90, 455, 185)">LLM 응답</text>
  <text x="455" y="286" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">~2K</text>

  <!-- Free space -->
  <rect x="485" y="85" width="160" height="190" rx="6" fill="url(#freeG)" opacity="0.5" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="565" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">남은 여유분</text>
  <text x="565" y="195" text-anchor="middle" font-size="11" fill="#94a3b8">~63.5K</text>
  <text x="565" y="286" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="600">~63.5K</text>

  <!-- Bracket: Input tokens -->
  <line x1="55" y1="300" x2="426" y2="300" stroke="#64748b" stroke-width="1.5"/>
  <line x1="55" y1="296" x2="55" y2="304" stroke="#64748b" stroke-width="1.5"/>
  <line x1="426" y1="296" x2="426" y2="304" stroke="#64748b" stroke-width="1.5"/>
  <text x="240" y="316" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">입력 토큰 (Input) — 상대적으로 저렴</text>

  <!-- Bracket: Output tokens -->
  <line x1="433" y1="300" x2="478" y2="300" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="433" y1="296" x2="433" y2="304" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="478" y1="296" x2="478" y2="304" stroke="#dc2626" stroke-width="1.5"/>
  <text x="455" y="316" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">출력</text>
  <text x="455" y="330" text-anchor="middle" font-size="9" fill="#dc2626">2~4x 비쌈</text>

  <!-- Bottom notes -->
  <g font-size="11" fill="#64748b">
    <text x="350" y="358" text-anchor="middle" font-weight="600">토큰 절약 효과가 큰 순서</text>
    <text x="350" y="378" text-anchor="middle">
      RAG 데이터 정제 > 대화 기록 관리 > 시스템 프롬프트 최적화 > 프롬프트 문구 다듬기
    </text>
  </g>
</svg>
