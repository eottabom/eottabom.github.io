<svg viewBox="0 0 1200 860" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 28px; font-weight: bold; fill: #000; }
      .state { font-size: 20px; fill: #000; font-weight: bold; text-anchor: middle; dominant-baseline: middle; }
      .state-inverse { fill: #fff; }
      .state-small { font-size: 17px; }
      .label { font-size: 17px; fill: #000; font-weight: bold; }
      .desc { font-size: 15px; fill: #000; }
      .info-box { font-size: 16px; fill: #000; }
    </style>
    <marker id="arrow-main" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 4, 0 8" fill="#333"/>
    </marker>
  </defs>

  <text x="600" y="50" class="title" text-anchor="middle">Region 생명주기 및 상태 전이</text>

  <!-- Main flow -->
  <circle cx="130" cy="170" r="60" fill="#FFB3B3" stroke="#FF6B6B" stroke-width="3"/>
  <text x="130" y="164" class="state">Eden</text>
  <text x="130" y="192" class="label" text-anchor="middle" font-size="15">새 객체</text>

  <path d="M 190 170 L 250 170" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrow-main)"/>
  <text x="220" y="153" class="desc" text-anchor="middle">Young GC</text>

  <!-- Survivor -->
  <circle cx="320" cy="170" r="60" fill="#B3D9FF" stroke="#4C99FF" stroke-width="3"/>
  <text x="320" y="170" class="state state-inverse state-small">Survivor</text>

  <path d="M 380 170 L 440 170" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrow-main)"/>
  <text x="410" y="153" class="desc" text-anchor="middle">생존 N회</text>

  <!-- Old -->
  <circle cx="510" cy="170" r="60" fill="#E5D4F5" stroke="#9966FF" stroke-width="3"/>
  <text x="510" y="170" class="state state-inverse">Old</text>

  <path d="M 570 170 L 630 170" stroke="#666" stroke-width="3" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow-main)"/>
  <text x="600" y="153" class="desc" text-anchor="middle">Mixed GC</text>

  <!-- Reclaimed -->
  <circle cx="700" cy="170" r="60" fill="#D4D4D4" stroke="#999" stroke-width="3"/>
  <text x="700" y="170" class="state">Free</text>

  <!-- Humongous path -->
  <rect x="70" y="330" width="170" height="120" fill="#FFD699" stroke="#FF8C00" stroke-width="3" rx="4"/>
  <text x="155" y="380" class="state state-small">Humongous</text>
  <text x="155" y="405" class="desc" text-anchor="middle" font-size="12">(큰 객체)</text>

  <path d="M 240 390 L 316 390" stroke="#FF8C00" stroke-width="3" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow-main)"/>
  <text x="278" y="375" class="desc" text-anchor="middle" fill="#FF8C00">회피 필요</text>

  <!-- Free from Humongous -->
  <rect x="320" y="330" width="170" height="120" fill="#E8E8E8" stroke="#999" stroke-width="2" stroke-dasharray="3,3" rx="4"/>
  <text x="405" y="380" class="state">Free</text>
  <text x="405" y="405" class="desc" text-anchor="middle" font-size="12">(반환)</text>

  <!-- Detail boxes -->
  <!-- Eden detail -->
  <rect x="20" y="520" width="320" height="260" fill="#FFE5E5" stroke="#FF6B6B" stroke-width="2" rx="4"/>
  <text x="40" y="550" class="label">Eden Region</text>
  <text x="40" y="575" class="desc" font-weight="bold">역할</text>
  <text x="55" y="602" class="info-box">new 연산자로 생성되는 객체 저장</text>
  <text x="55" y="626" class="info-box">애플리케이션의 첫 저장소</text>
  <text x="40" y="658" class="desc" font-weight="bold">특징</text>
  <text x="55" y="685" class="info-box">Eden 차면 즉시 Young GC</text>
  <text x="55" y="709" class="info-box">대부분의 객체가 여기서 회수됨</text>
  <text x="55" y="733" class="info-box">여러 Region이 시점에 따라</text>
  <text x="55" y="757" class="info-box">Eden 역할을 맡을 수 있음</text>

  <!-- Survivor detail -->
  <rect x="375" y="520" width="320" height="260" fill="#E3F2FD" stroke="#4C99FF" stroke-width="2" rx="4"/>
  <text x="395" y="550" class="label">Survivor Region</text>
  <text x="395" y="575" class="desc" font-weight="bold">역할</text>
  <text x="410" y="602" class="info-box">Young GC를 견딘 객체를</text>
  <text x="410" y="626" class="info-box">임시로 보관하는 구간</text>
  <text x="410" y="650" class="info-box">짧게 살면 여기서 회수됨</text>
  <text x="395" y="682" class="desc" font-weight="bold">승격 규칙</text>
  <text x="410" y="709" class="info-box">여러 번 통과한 객체가 승격 대상</text>
  <text x="410" y="733" class="info-box">보통 2-15회 후 Old로 이동</text>

  <!-- Old detail -->
  <rect x="730" y="520" width="320" height="260" fill="#F5E5FF" stroke="#9966FF" stroke-width="2" rx="4"/>
  <text x="750" y="550" class="label">Old Region</text>
  <text x="750" y="575" class="desc" font-weight="bold">역할</text>
  <text x="765" y="602" class="info-box">오래 살아남은 객체 저장</text>
  <text x="765" y="626" class="info-box">애플리케이션 핵심 상태 유지</text>
  <text x="750" y="658" class="desc" font-weight="bold">정리 방식</text>
  <text x="765" y="685" class="info-box">전체 Old를 한 번에 비우지 않음</text>
  <text x="765" y="709" class="info-box">garbage 비율 높은 Region을</text>
  <text x="765" y="733" class="info-box">Mixed GC 대상으로 선택</text>
</svg>
