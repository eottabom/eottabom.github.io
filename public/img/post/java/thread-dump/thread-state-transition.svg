  <text x="920" y="610"
        style="font-size:16px;font-weight:700;fill:#fff;text-anchor:middle;dominant-baseline:middle;">
    TIMED_WAITING
  </text>

  <rect x="380" y="634" width="180" height="52" rx="26"
